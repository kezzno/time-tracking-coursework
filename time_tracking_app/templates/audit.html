{% extends "base.html" %}
{% block content %}
<h3 class="mb-3">Журнал действий (последние 200)</h3>
<div class="card shadow-sm">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead><tr><th>Дата</th><th>User ID</th><th>Действие</th></tr></thead>
        <tbody>
          {% for l in logs %}
          <tr>
            <td>{{ l.created_at|localdt }}</td>
            <td>{{ l.user_id }}</td>
            <td>{{ l.action }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
